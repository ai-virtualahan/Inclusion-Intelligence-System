<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Inclusion Intelligence System</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
  /* background: linear-gradient(135deg, #0b1f3a, #10345f, #159e9a); */
  background: linear-gradient(to right, #0B2A4A, #123B63);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 18px;
}

.page {
  width: 100%;
  max-width: 1200px;
  height: 85vh;
  max-height: 860px;
  background: linear-gradient(to bottom, #eef7f8, #f8fcfc);
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
  padding: 34px 48px 120px;
}

.dots {
  position: absolute;
  top: 38px;
  left: 38px;
  width: 90px;
  height: 60px;
  background-image: radial-gradient(#b8dedd 1.5px, transparent 1.5px);
  background-size: 12px 12px;
}

.top-circle {
  position: absolute;
  top: -40px;
  right: -40px;
  width: 220px;
  height: 220px;
  background: rgba(21, 158, 154, 0.10);
  border-radius: 50%;
}

.top-circle2 {
  position: absolute;
  top: 22px;
  right: 120px;
  width: 135px;
  height: 135px;
  background: rgba(11, 31, 58, 0.05);
  border-radius: 50%;
}

.brand {
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 2;
  margin-top: 20px;
  margin-bottom: 20px;
}

.logo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, #0b1f3a, #159e9a);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 32px;
  font-weight: bold;
  box-shadow: 0 8px 18px rgba(11, 31, 58, 0.18);
}

.brand-text h1 {
  font-size: 34px;
  color: #0b1f3a;
  margin-bottom: 6px;
}

.brand-text p {
  font-size: 17px;
  color: #52707c;
}

.card {
  width: 100%;
  max-width: 580px;
  background: #ffffff;
  border-radius: 22px;
  padding: 24px 26px 20px;
  box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
  position: relative;
  z-index: 2;
  margin: 0;
  
  /* margin-right: 80px; */
  
}

.card h2 {
  text-align: center;
  font-size: 26px;
  color: #111827;
  margin-bottom: 8px;
}

.card .sub {
  text-align: center;
  color: #6b7280;
  font-size: 15px;
  margin-bottom: 22px;
}

.page {
  display: flex;
  justify-content: flex-end; /* move card to right */
  align-items: center;
  padding: 50px;
}

.input-box {
  margin-bottom: 14px;
}

.input-box input,
.input-box select {
  width: 100%;
  height: 48px;
  border: 1px solid #d7dee4;
  border-radius: 12px;
  padding: 0 15px;
  font-size: 15px;
  outline: none;
  background: #fff;
}

.input-box input:focus,
.input-box select:focus {
  border-color: #00d4a1;
  box-shadow: 0 0 0 4px rgba(0, 212, 161, 0.12);
}

.row-between {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  gap: 12px;
  flex-wrap: wrap;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #374151;
  font-size: 14px;
}

.remember input {
  width: 16px;
  height: 16px;
  accent-color: #159e9a;
}

.link {
  color: #00d4a1;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

.link:hover {
  color: #0b1f3a;
}

.btn {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: 12px;
  /* background: linear-gradient(90deg, #0b1f3a, #159e9a); */
  background: linear-gradient(to right, #0B2A4A, #00d4a1);
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-1px);
  opacity: 0.96;
}

.divider {
  text-align: center;
  margin: 18px 0;
  color: #8b95a1;
  position: relative;
  font-size: 15px;
}

.divider:before,
.divider:after {
  content: "";
  position: absolute;
  top: 50%;
  width: 39%;
  height: 1px;
  background: #d7dee4;
}

.divider:before {
  left: 0;
}

.divider:after {
  right: 0;
}

.google-btn {
  width: 100%;
  height: 52px;
  border: 2px solid #bfe9e6;
  border-radius: 12px;
  background: white;
  color: #1f2937;
  font-size: 17px;
  cursor: pointer;
  font-weight: 600;
}

.google-btn:hover {
  border-color: #159e9a;
  background: #f7ffff;
}

.bottom-text {
  text-align: center;
  margin-top: 18px;
  color: #4b5563;
  font-size: 15px;
}

.bottom-text a {
  color: #159e9a;
  text-decoration: none;
  font-weight: bold;
}

.waves {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 130px;
}

.wave1,
.wave2,
.wave3 {
  position: absolute;
  width: 130%;
  left: -15%;
  border-radius: 50%;
}

.wave1 {
  height: 70px;
  bottom: 40px;
  background: rgba(21, 158, 154, 0.18);
}

.wave2 {
  height: 60px;
  bottom: 20px;
  background: rgba(21, 158, 154, 0.30);
}

.wave3 {
  height: 60px;
  bottom: -10px;
  background: linear-gradient(90deg, #0b1f3a, #159e9a);
}

@media (max-width: 1024px) {
  .page {
    padding: 28px 28px 110px;
    height: auto;
    min-height: 92vh;
  }

  .brand-text h1 {
    font-size: 28px;
  }

  .card {
    max-width: 560px;
  }
}

@media (max-width: 768px) {
  .page {
    padding: 24px 18px 100px;
  }

  .brand {
    flex-direction: column;
    text-align: center;
    margin-top: 24px;
  }

  .brand-text h1 {
    font-size: 24px;
  }

  .brand-text p {
    font-size: 15px;
  }

  .card {
    padding: 24px 18px;
  }

  .card h2 {
    font-size: 26px;
  }

  .card .sub {
    font-size: 14px;
  }
}
  </style>
</head>
<body>
  <div class="page">
    <div class="dots"></div>
    <div class="top-circle"></div>
    <div class="top-circle2"></div>

    <div class="brand">
      <div class="logo">I</div>
      <div class="brand-text">
        <h1>Inclusion Intelligence System</h1>
        <p>Empowering Inclusion. Enriching Lives.</p>
      </div>
    </div>

    <div class="card">
      <h2>Welcome Back!</h2>
      <p class="sub">Sign in to continue to your account</p>

      <form onsubmit="loginUser(event)">
        <div class="input-box">
          <input type="email" placeholder="Email Address">
        </div>

        <div class="input-box">
          <input type="password" placeholder="Password">
        </div>

        <div class="row-between">
          <label class="remember">
            <input type="checkbox">
            <span>Remember me</span>
          </label>

          <a href="#" class="link">Forgot password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="divider">or</div>

        <button type="button" class="google-btn">Continue with Google</button>

        <p class="bottom-text">
          Don’t have an account?
          <a href="register.html">Register here</a>
        </p>
      </form>
    </div>

    <div class="waves">
      <div class="wave1"></div>
      <div class="wave2"></div>
      <div class="wave3"></div>
    </div>
  </div>

  <script>
  function loginUser(e) {
    e.preventDefault();

    // kuhaon ang values (optional for now)
    let email = document.querySelector('input[type="email"]').value;
    let password = document.querySelector('input[type="password"]').value;

    // simple validation (optional)
    if (email === "" || password === "") {
      alert("Please fill in all fields");
      return;
    }

    // SET LOGIN STATE
    localStorage.setItem("loggedIn", "true");

    alert("Login successful!");

    // redirect to home page
    window.location.href = "home.html";
  }
</script> 
</body>
</html>
