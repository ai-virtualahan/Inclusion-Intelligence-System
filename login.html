<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Inclusion Intelligence</title>

</head>
<body>

<div class="login-container">
    <h2>Inclusion Intelligence</h2>
    <h1>Login</h1>

    </p>
</div>

</body>
