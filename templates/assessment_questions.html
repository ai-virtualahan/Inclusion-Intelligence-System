<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assessment Questions</title>

  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/super_dashboard.css') }}">

  <link rel="stylesheet"
        href="{{ url_for('static', filename='css/question_choices.css') }}">
</head>

<body>

<div class="navbar">
  <div><strong>Inclusion Intelligence</strong></div>

  <div>
    <a href="{{ url_for('super_admin.super_dashboard') }}">Dashboard</a>
    <a href="#">Users</a>
    <a href="#">Reports</a>
    <a href="{{ url_for('login.logout') }}">Logout</a>
  </div>
</div>

<div class="container">

  <h1>Assessment Questions</h1>
    <form method="GET" action="{{ url_for('super_admin.assessment_questions') }}">
        <label for="dimension_id"><strong>Filter by Dimension:</strong></label>

        <select name="dimension_id" id="dimension_id" onchange="this.form.submit()">
            <option value="">All Dimensions</option>

            {% for dim in dimensions %}
                <option value="{{ dim.id }}"
                    {% if selected_dimension == dim.id|string %}selected{% endif %}>
                    {{ dim.name }}
                </option>
            {% endfor %}
        </select>
    </form>
  <table>

    <thead>
      <tr>
        <th>Dimension</th>
        <th>Question</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>

      {% for q in questions %}

      <tr>

        <td>{{ q.dimension_name }}</td>

        <td>{{ q.question_text }}</td>

        <td>
          <button type="button"
            data-question_id="{{ q.id }}"
            onclick="openChoicesModal('{{ q.id }}', `{{ q.question_text }}`)">
          View Choices
          </button> 
          <a href="#">Edit</a>
          
        </td>

      </tr>

      {% else %}

      <tr>
        <td colspan="6">No questions found.</td>
      </tr>

      {% endfor %}

    </tbody>

  </table>

</div>

<div id="choicesModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeChoicesModal()">&times;</span>

    <h2>Question Choices</h2>
    <p><strong>Question:</strong> <span id="modalQuestionText"></span></p>

    <table>
      <thead>
        <tr>
          <th>Letter</th>
          <th>Choice</th>
          <th>Score</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="choicesTableBody"></tbody>
    </table>

    <form id="editChoiceForm" method="POST" style="display:none;">
      <h3>Edit Choice</h3>

      <input type="hidden" id="editChoiceId">
      <input type="hidden"
             name="question_id"
             id="editQuestionId">

      <label>Letter</label>
      <input type="text" id="editChoiceLetter" readonly>

      <label>Choice Text</label>
      <textarea name="choice_text" id="editChoiceText" rows="4" required></textarea>

      <label>Score</label>
      <input type="number" name="choice_score" id="editChoiceScore" step="0.01" required>

      <button type="submit">Save Changes</button>
    </form>

  </div>
</div>
<input type="hidden" id="openQuestionId" value="{{ request.args.get('open_question_id', '') }}">
<script src="{{ url_for('static', filename='js/assessment_questions.js') }}"></script>
</body>
</html>
