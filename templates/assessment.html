<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IIS - Inclusion Intelligence System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/assessment.css') }}">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>IIS Dashboard</h3>

        <button onclick="showPage('dashboard')">
            Dashboard
        </button>

        <button onclick="showPage('examSelect')">
            Start Assessment
        </button>

        <button onclick="showPage('diagnostic')">
            Diagnostic Engine
        </button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <!-- DASHBOARD -->
        <section id="dashboard" class="page active">
            <div class="card">
                <h2>Inclusion Maturity Dashboard</h2>
                <p>Track organizational inclusion maturity level and assessment history.</p>

                <button class="primary" onclick="showPage('examSelect')">
                    Start New Assessment
                </button>
            </div>

            <!-- SCOREBOARD RENDERED BY JS -->
            <div id="dashboardContent"></div>
        </section>

        <!-- EXAM SELECT -->
        <section id="examSelect" class="page">
            <div class="card">
                <h2>Select Assessment Type</h2>

                <div class="exam-grid">
                    <div class="exam" onclick="startExam('Hiring')">Hiring</div>
                    <div class="exam" onclick="startExam('Onboarding')">Onboarding</div>
                    <div class="exam" onclick="startExam('Accommodation')">Accommodation</div>
                    <div class="exam" onclick="startExam('Retention')">Retention</div>
                    <div class="exam" onclick="startExam('Culture')">Culture</div>
                </div>

                <button onclick="showPage('dashboard')">
                    Back to Dashboard
                </button>
            </div>
        </section>

        <!-- DIAGNOSTIC ENGINE -->
        <section id="diagnostic" class="page">
            <div class="card">
                <h2>Inclusion Diagnostic Engine</h2>

                <div id="questionBox"></div>

                <button onclick="showPage('examSelect')">
                    Choose Assessment Type
                </button>
            </div>
        </section>

        <!-- RESULTS -->
        <section id="results" class="page">
            <div class="card">
                <div id="resultBox"></div>

                <button onclick="showPage('dashboard')">
                    Back to Dashboard
                </button>
            </div>
        </section>

    </main>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
