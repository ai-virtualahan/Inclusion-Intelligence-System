<!DOCTYPE html>
<html>
<head>
    <title>IIS - Inclusion Intelligence System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ FIXED CSS PATH (Flask-safe) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/assessment.css') }}">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Inclusion Intelligence System</h3>

       <button id="dashboardBtn"
        onclick="showPage('dashboard')">
    Inclusion Maturity Dashboard
</button>

<button id="diagnosticBtn"
        onclick="showPage('diagnostic')">
    Inclusion Diagnostic Engine
</button>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- DASHBOARD -->
        <div id="dashboard" class="page active">
            <div class="card">
                <h2>Inclusion Maturity Dashboard</h2>
                <p>Track your organization's Inclusion Maturity Level.</p>
            
            <div id="dashboardBox"></div>
            
            </div>
        </div>

        <!-- DIAGNOSTIC ENGINE -->
        <div id="diagnostic" class="page">
            <div class="card">
                <h2>Inclusion Diagnostic Engine</h2>

                <div id="questionBox"></div>

                <button class="primary" onclick="showPage('examSelect')">
                    Choose Assessment Type
                </button>
            </div>
        </div>

        <!-- EXAM SELECT -->
        <div id="examSelect" class="page">
            <div class="card">
                <h2>Select Assessment Type</h2>

                <div class="exam-grid">
                    <div class="exam" onclick="startExam('Hiring')">Hiring</div>
                    <div class="exam" onclick="startExam('Onboarding')">Onboarding</div>
                    <div class="exam" onclick="startExam('Accommodation')">Accommodation</div>
                    <div class="exam" onclick="startExam('Retention')">Retention</div>
                    <div class="exam" onclick="startExam('Culture')">Culture</div>
                </div>
            </div>
        </div>


        <!-- RESULT PAGE (IMPORTANT - YOU WERE MISSING THIS LOGIC TARGET) -->
        <div id="results" class="page">
            <div class="card">
                <div id="resultBox"></div>

                <button class="primary" onclick="showPage('dashboard')">
                    Back to Dashboard
                </button>
            </div>
        </div>

    </div>
</div>

<div id="progressModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
background:rgba(0,0,0,0.6); justify-content:center; align-items:center;">

  <div style="background:white; padding:25px; border-radius:16px; text-align:center; width:300px;">
    
    <h2 style="color:#0E2240;">Progress Saved</h2>
    <p style="color:#0E2240;">Your assessment has been recorded.</p>

    <button onclick="goToExamSelect()" 
        style="background:#00B8A0; color:white; border:none; padding:12px 18px; border-radius:10px; cursor:pointer;">
        Choose Assessment Type
    </button>

  </div>

</div>

<!-- ✅ FIXED JS PATH (VERY IMPORTANT) -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
